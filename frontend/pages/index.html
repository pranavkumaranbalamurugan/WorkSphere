<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSync Test UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #b8ff57;
      --accent-dim: rgba(184,255,87,0.08);
      --text: #e8e8e8;
      --muted: #666;
      --mono: 'JetBrains Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-family: var(--display);
      font-size: clamp(56px, 9vw, 96px);
      line-height: 0.92;
      letter-spacing: 0.01em;
      text-align: center;
      margin-bottom: 48px;
    }

    .divider {
      width: 1px;
      height: 48px;
      background: var(--border);
      margin: 0 auto 48px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .action-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #0e0e0e;
      font-family: var(--display);
      font-size: 20px;
      letter-spacing: 0.05em;
      padding: 14px 36px;
      border-radius: 4px;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }

    .btn-arrow {
      font-size: 14px;
      font-family: var(--mono);
      font-weight: 500;
    }

    .footer {
      position: fixed;
      bottom: 24px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <p class="eyebrow">Internal · Test Environment</p>
  <h1>HomeSync<br>Test UI</h1>
  <div class="divider"></div>

  <div class="actions">
    <p class="action-label">Quick Actions</p>
    <a href="create_employee.html" class="btn">
      create_employee
      <span class="btn-arrow">↗</span>
    </a>
    <a href="display_employees.html" class="btn">
      display_employees
      <span class="btn-arrow">↗</span>
    </a>
  </div>

  <p class="footer">HomeSync · v0.1.0</p>

</body>
</html>
